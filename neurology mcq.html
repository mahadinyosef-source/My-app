<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurology MCQ Archive — 296 Questions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap');

  :root {
    --navy: #0f1d35;
    --navy-mid: #162647;
    --teal: #00b4d8;
    --teal-light: #90e0ef;
    --gold: #f4a261;
    --correct-bg: #d4edda;
    --correct-text: #155724;
    --correct-border: #28a745;
    --white: #ffffff;
    --off-white: #f0f4f8;
    --text: #1a1a2e;
    --muted: #6b7280;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--off-white);
    color: var(--text);
    line-height: 1.7;
    direction: ltr;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1a3a6e 100%);
    color: var(--white);
    padding: 48px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(0,180,216,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(244,162,97,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--white);
    position: relative;
    z-index: 1;
  }
  header h1 span { color: var(--teal); }
  header p {
    margin-top: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.95rem;
    position: relative;
    z-index: 1;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .stat-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 40px;
    padding: 8px 20px;
    font-size: 0.88rem;
    color: var(--teal-light);
    font-weight: 600;
  }

  /* Controls */
  .controls {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 12px 18px 12px 44px;
    border: 2px solid #dde3f0;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: 'Cairo', sans-serif;
    background: var(--white);
    transition: border-color 0.2s;
    outline: none;
  }
  .search-box input:focus { border-color: var(--teal); }
  .search-box .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
  }
  select {
    padding: 12px 16px;
    border: 2px solid #dde3f0;
    border-radius: var(--radius);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  select:focus { border-color: var(--teal); }
  .btn-toggle {
    padding: 12px 20px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-toggle:hover { background: var(--navy-mid); transform: translateY(-1px); }
  .btn-toggle.active { background: var(--teal); }

  /* Counter */
  .result-count {
    max-width: 1100px;
    margin: 10px auto 0;
    padding: 0 16px;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
  }

  /* Topic Index Sidebar */
  .layout {
    max-width: 1100px;
    margin: 20px auto 48px;
    padding: 0 16px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media(max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
  .sidebar {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--off-white);
  }
  .topic-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    transition: background 0.15s;
    line-height: 1.4;
    gap: 8px;
  }
  .topic-btn:hover { background: var(--off-white); }
  .topic-btn.active { background: #e8f7fc; color: #007ea8; font-weight: 700; }
  .topic-btn .count {
    background: var(--off-white);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .topic-btn.active .count { background: var(--teal); color: white; }

  /* MCQ Section */
  .mcq-section { }
  .section-header {
    background: linear-gradient(90deg, var(--navy) 0%, #1e3a6e 100%);
    color: var(--white);
    padding: 14px 22px;
    border-radius: var(--radius) var(--radius) 0 0;
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-header:first-child { margin-top: 0; }
  .section-header .q-count {
    font-size: 0.78rem;
    background: rgba(255,255,255,0.15);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .section-questions {
    background: var(--white);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 4px;
  }

  /* Question Card */
  .q-card {
    border-bottom: 1px solid #f0f0f0;
    padding: 22px 24px;
    transition: background 0.15s;
  }
  .q-card:last-child { border-bottom: none; }
  .q-card:hover { background: #fafbff; }
  .q-header {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .q-num {
    background: var(--navy);
    color: var(--white);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-year {
    background: var(--gold);
    color: white;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }
  .options-list {
    list-style: none;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 7px;
    font-size: 0.88rem;
    color: #444;
    background: var(--off-white);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: 2px solid transparent;
  }
  .option-item:hover { background: #e8f4f8; border-color: #b0d9e8; }
  .option-item.correct {
    background: #d4edda;
    border-color: var(--correct-border);
    color: var(--correct-text);
    font-weight: 600;
  }
  .option-item.incorrect {
    background: #fde8e8;
    border-color: #e74c3c;
    color: #a30000;
  }
  .option-item.selected-correct {
    background: #c3e6cb;
    border-color: #28a745;
    color: #155724;
    font-weight: 700;
  }
  .opt-label {
    font-weight: 700;
    min-width: 22px;
    flex-shrink: 0;
  }
  .answer-reveal {
    margin-top: 12px;
    padding: 10px 14px;
    background: #eafbf0;
    border-left: 4px solid var(--correct-border);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--correct-text);
    font-weight: 600;
    display: none;
  }
  .answer-reveal.show { display: flex; align-items: center; gap: 8px; }
  .answer-reveal .tick { font-size: 1.1rem; }

  /* Hidden */
  .hidden { display: none !important; }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: var(--off-white); }
  .sidebar::-webkit-scrollbar-thumb { background: #c0cfe8; border-radius: 10px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; }
</style>
</head>

let showAnswers = false;
let currentTopic = null;
let selectedOptions = {};

// Build topic list in sidebar
function buildTopicSidebar() {
  const container = document.getElementById('topicList');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'topic-btn' + (currentTopic === null ? ' active' : '');
  allBtn.innerHTML = `<span>All Topics</span><span class="count">${allData.reduce((a,t)=>a+t.questions.length,0)}</span>`;
  allBtn.onclick = () => { currentTopic = null; filterQuestions(); updateTopicSidebar(); };
  container.appendChild(allBtn);

  allData.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (currentTopic === t.topic ? ' active' : '');
    btn.innerHTML = `<span>${t.topic}</span><span class="count">${t.questions.length}</span>`;
    btn.onclick = () => { currentTopic = t.topic; filterQuestions(); updateTopicSidebar(); };
    container.appendChild(btn);
  });
}

function updateTopicSidebar() {
  const btns = document.querySelectorAll('.topic-btn');
  btns[0].classList.toggle('active', currentTopic === null);
  allData.forEach((t, i) => {
    btns[i+1].classList.toggle('active', currentTopic === t.topic);
  });
}

function filterQuestions() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const year = document.getElementById('yearFilter').value;
  const content = document.getElementById('mcqContent');
  content.innerHTML = '';
  let totalVisible = 0;

  allData.forEach(topic => {
    if (currentTopic && topic.topic !== currentTopic) return;

    const filtered = topic.questions.filter(q => {
      const matchYear = !year || q.year === year;
      const matchSearch = !search ||
        q.text.toLowerCase().includes(search) ||
        q.options.some(o => o.toLowerCase().includes(search));
      return matchYear && matchSearch;
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'mcq-section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span>🧠 ${topic.topic}</span><span class="q-count">${filtered.length} Q</span>`;
    sectionEl.appendChild(header);

    const qList = document.createElement('div');
    qList.className = 'section-questions';

    filtered.forEach(q => {
      const card = buildQuestionCard(q);
      qList.appendChild(card);
    });

    sectionEl.appendChild(qList);
    content.appendChild(sectionEl);
  });

  if (totalVisible === 0) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No questions found matching your search.</p></div>`;
  }

  document.getElementById('resultCount').textContent = `Showing ${totalVisible} question${totalVisible !== 1 ? 's' : ''}`;
}

function buildQuestionCard(q) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.dataset.qid = q.id;

  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `<span class="q-num">${q.id}</span><span class="q-year">${q.year}</span><span class="q-text">${q.text}</span>`;
  card.appendChild(header);

  const ul = document.createElement('ul');
  ul.className = 'options-list';
  const labels = ['A','B','C','D','E','F'];

  q.options.forEach((opt, idx) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    if (showAnswers && idx === q.answer) li.classList.add('correct');
    li.innerHTML = `<span class="opt-label">${labels[idx]}</span><span>${opt}</span>`;
    li.onclick = () => selectOption(q, idx, ul, li, answerDiv);
    ul.appendChild(li);
  });
  card.appendChild(ul);

  const answerDiv = document.createElement('div');
  answerDiv.className = 'answer-reveal' + (showAnswers ? ' show' : '');
  answerDiv.innerHTML = `<span class="tick">✅</span> Correct Answer: <strong>${labels[q.answer]}) ${q.options[q.answer]}</strong>`;
  card.appendChild(answerDiv);

  return card;
}

function selectOption(q, idx, ul, clickedLi, answerDiv) {
  const items = ul.querySelectorAll('.option-item');
  items.forEach(i => i.classList.remove('selected-correct','incorrect','correct'));

  if (idx === q.answer) {
    clickedLi.classList.add('selected-correct');
  } else {
    clickedLi.classList.add('incorrect');
    items[q.answer].classList.add('correct');
  }
  answerDiv.classList.add('show');
}

function toggleAllAnswers() {
  showAnswers = !showAnswers;
  const btn = document.getElementById('toggleAnswers');
  btn.classList.toggle('active', showAnswers);
  btn.textContent = showAnswers ? '🙈 Hide Answers' : '👁 Show All Answers';
  filterQuestions();
}

// Init
buildTopicSidebar();
filterQuestions();
